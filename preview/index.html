<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPUI Preview Index</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg-app);
        font-family: var(--font-family-base);
        color: var(--text-primary);
      }
      .wrap {
        width: min(640px, calc(100vw - 32px));
        background: var(--bg-panel);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
      }
      h1 {
        margin: 0 0 var(--space-2) 0;
        font-size: var(--font-size-16);
        line-height: var(--line-height-16);
      }
      p {
        margin: 0 0 var(--space-3) 0;
        color: var(--text-secondary);
        font-size: var(--font-size-13);
      }
      .links {
        display: grid;
        gap: var(--space-2);
      }
      a {
        display: block;
        height: var(--control-height-default);
        line-height: var(--control-height-default);
        padding: 0 var(--space-3);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-primary);
        background: var(--bg-panel);
      }
      a:hover {
        background: var(--bg-hover);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Multi Collection Preview</h1>
      <p>정적 화면 시나리오(2개/3개/4개 컬렉션 동시 조회)</p>
      <div class="links">
        <a href="./collections-2.html">2 Panels Preview</a>
        <a href="./collections-3.html">3 Panels Preview</a>
        <a href="./collections-4.html">4 Panels Preview</a>
      </div>
    </main>
  </body>
</html>
